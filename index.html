<!DOCTYPE html>
<html>

<head>

    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<div class="box">
    <img src="logo.png" class="logo">


    <h1>🌦 Weather App</h1>


    <input 
    id="city" 
    placeholder="Enter city name">


    <button onclick="getWeather()">
        Search
    </button>



    <div class="weather-card">

        <h2 id="name"></h2>

        <p id="temp"></p>

        <p id="weather"></p>

    </div>



</div>



<script src="script.js"></script>


</body>

</html>
